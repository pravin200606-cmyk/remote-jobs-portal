<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Register as Employer')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="auth-page" style="padding: 2rem 1rem;">
    <div class="auth-card fade-in" style="max-width: 560px;">
        <div class="auth-header">
            <div style="font-size:2rem; margin-bottom:0.5rem;">🏢</div>
            <h1>Employer Registration</h1>
            <p>Start hiring remote talent from around the world</p>
        </div>

        <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>

        <form th:action="@{/register/employer}" th:object="${user}" method="post">
            <div class="form-row form-row-2">
                <div class="form-group">
                    <label class="form-label">Your Full Name *</label>
                    <input type="text" th:field="*{fullName}" class="form-control" placeholder="John Smith" required/>
                    <div class="form-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Phone</label>
                    <input type="tel" th:field="*{phone}" class="form-control" placeholder="+1 234 567 8900"/>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Company Name *</label>
                <input type="text" th:field="*{companyName}" class="form-control" placeholder="Acme Corp" required/>
            </div>

            <div class="form-group">
                <label class="form-label">Company Website</label>
                <input type="url" th:field="*{companyWebsite}" class="form-control" placeholder="https://yourcompany.com"/>
            </div>

            <div class="form-group">
                <label class="form-label">Work Email *</label>
                <input type="email" th:field="*{email}" class="form-control" placeholder="hr@company.com" required/>
                <div class="form-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="form-row form-row-2">
                <div class="form-group">
                    <label class="form-label">Password *</label>
                    <input type="password" th:field="*{password}" class="form-control" placeholder="Min 6 characters" required/>
                    <div class="form-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Password *</label>
                    <input type="password" th:field="*{confirmPassword}" class="form-control" placeholder="Repeat password" required/>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg">
                <i class="fas fa-building"></i> Create Employer Account
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a th:href="@{/login}">Sign in</a> |
            <a th:href="@{/register/jobseeker}">Register as Job Seeker</a>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
