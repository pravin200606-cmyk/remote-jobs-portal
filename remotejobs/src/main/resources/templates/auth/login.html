<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="auth-page">
    <div class="auth-card fade-in">
        <div class="auth-header">
            <div style="font-size:2.5rem; margin-bottom:0.5rem;">⚡</div>
            <h1>Welcome Back</h1>
            <p>Sign in to your RemoteWork Hub account</p>
        </div>

        <div th:if="${error}" class="alert alert-error" data-auto-dismiss>
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>
        <div th:if="${message}" class="alert alert-success" data-auto-dismiss>
            <i class="fas fa-check-circle"></i> <span th:text="${message}"></span>
        </div>
        <div th:if="${param.logout}" class="alert alert-info" data-auto-dismiss>
            <i class="fas fa-info-circle"></i> You have been logged out.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="username" class="form-control" placeholder="you@example.com" required autofocus/>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required/>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <div class="auth-divider"><span>or</span></div>

        <div class="auth-footer">
            Don't have an account? <a th:href="@{/register}">Create one free</a>
        </div>

        <div style="margin-top: 1.5rem; padding: 1rem; background: rgba(13,148,136,0.08); border-radius: 8px; font-size: 0.8rem; color: var(--text-muted);">
            <strong style="color: var(--text);">Demo Credentials:</strong><br/>
            Admin: admin@remotejobs.com / admin123<br/>
            Employer: employer@techcorp.com / employer123<br/>
            Job Seeker: seeker@example.com / seeker123
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
