<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Error')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div style="min-height: calc(100vh - 64px); display:flex; align-items:center; justify-content:center; padding:2rem;">
  <div class="text-center" style="max-width:500px;">
    <div style="font-size:5rem; margin-bottom:1rem;" th:text="${code == 404} ? '🔍' : (${code == 403} ? '🔒' : '⚠️')"></div>
    <h1 style="font-size:4rem; color:var(--primary-light); font-family:var(--font-heading);" th:text="${code ?: '500'}"></h1>
    <h2 class="mb-3"
        th:text="${code == 404} ? 'Page Not Found' :
                 (${code == 403} ? 'Access Denied' : 'Something Went Wrong')"></h2>
    <p class="text-muted mb-4" th:text="${error ?: 'An unexpected error occurred. Please try again.'}"></p>
    <div class="d-flex gap-2" style="justify-content:center;">
      <a th:href="@{/}" class="btn btn-primary"><i class="fas fa-home"></i> Go Home</a>
      <a href="javascript:history.back()" class="btn btn-ghost"><i class="fas fa-arrow-left"></i> Go Back</a>
    </div>
  </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
