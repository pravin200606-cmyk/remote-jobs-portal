<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Company Profile')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="dashboard-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">Employer</div>
    <ul class="sidebar-nav">
      <li><a th:href="@{/employer/dashboard}"><i class="fas fa-tachometer-alt nav-icon"></i> Dashboard</a></li>
      <li><a th:href="@{/employer/jobs/new}"><i class="fas fa-plus-circle nav-icon"></i> Post New Job</a></li>
      <li><a th:href="@{/employer/jobs}"><i class="fas fa-briefcase nav-icon"></i> My Job Posts</a></li>
      <li><a th:href="@{/employer/notifications}"><i class="fas fa-bell nav-icon"></i> Notifications</a></li>
      <li><a th:href="@{/employer/profile}" class="active"><i class="fas fa-building nav-icon"></i> Company Profile</a></li>
      <li><a th:href="@{/logout}"><i class="fas fa-sign-out-alt nav-icon"></i> Logout</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <h1 style="font-size:1.6rem; margin-bottom:0.5rem;">Company Profile</h1>
    <p class="text-muted mb-4">Update your company information</p>

    <div th:if="${success}" class="alert alert-success" data-auto-dismiss>
      <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
    </div>

    <form th:action="@{/employer/profile/update}" method="post" style="max-width:700px;">
      <div class="card mb-3">
        <h3 class="mb-3"><i class="fas fa-building"></i> Company Details</h3>
        <div class="form-row form-row-2">
          <div class="form-group">
            <label class="form-label">Contact Name</label>
            <input type="text" name="fullName" class="form-control" th:value="${user.fullName}" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="tel" name="phone" class="form-control" th:value="${user.phone}"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Company Name</label>
          <input type="text" name="companyName" class="form-control" th:value="${user.companyName}" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Company Website</label>
          <input type="url" name="companyWebsite" class="form-control" th:value="${user.companyWebsite}" placeholder="https://yourcompany.com"/>
        </div>
        <div class="form-group">
          <label class="form-label">About Company</label>
          <textarea name="profileSummary" class="form-control" rows="4"
                    placeholder="Describe your company, culture, and mission..."
                    th:text="${user.profileSummary}"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Email (read-only)</label>
          <input type="email" class="form-control" th:value="${user.email}" readonly style="opacity:0.6;"/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-lg">
        <i class="fas fa-save"></i> Save Profile
      </button>
    </form>
  </main>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
