<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Notifications')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="dashboard-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">Employer</div>
    <ul class="sidebar-nav">
      <li><a th:href="@{/employer/dashboard}"><i class="fas fa-tachometer-alt nav-icon"></i> Dashboard</a></li>
      <li><a th:href="@{/employer/jobs/new}"><i class="fas fa-plus-circle nav-icon"></i> Post New Job</a></li>
      <li><a th:href="@{/employer/jobs}"><i class="fas fa-briefcase nav-icon"></i> My Job Posts</a></li>
      <li><a th:href="@{/employer/notifications}" class="active"><i class="fas fa-bell nav-icon"></i> Notifications</a></li>
      <li><a th:href="@{/employer/profile}"><i class="fas fa-building nav-icon"></i> Company Profile</a></li>
      <li><a th:href="@{/logout}"><i class="fas fa-sign-out-alt nav-icon"></i> Logout</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <h1 style="font-size:1.6rem; margin-bottom:0.5rem;"><i class="fas fa-bell"></i> Notifications</h1>
    <p class="text-muted mb-4">New application alerts and updates</p>

    <div th:if="${#lists.isEmpty(notifications)}" class="empty-state">
      <i class="fas fa-bell-slash"></i>
      <h3>No notifications yet</h3>
      <p>You'll see alerts here when candidates apply to your jobs.</p>
    </div>

    <div th:unless="${#lists.isEmpty(notifications)}" class="card">
      <div th:each="notif : ${notifications}"
           style="padding:1rem; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; gap:1rem;">
        <div class="stat-icon blue" style="width:40px; height:40px; border-radius:50%; flex-shrink:0;">
          <i class="fas fa-user-plus"></i>
        </div>
        <div style="flex:1;">
          <p th:text="${notif.message}" style="font-weight:500;"></p>
          <small class="text-muted" th:text="${#temporals.format(notif.createdAt,'MMM dd, yyyy HH:mm')}"></small>
        </div>
        <span th:unless="${notif.read}" class="badge badge-primary" style="flex-shrink:0;">New</span>
      </div>
    </div>
  </main>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
