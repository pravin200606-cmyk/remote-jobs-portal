<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('My Jobs')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="dashboard-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">Employer</div>
    <ul class="sidebar-nav">
      <li><a th:href="@{/employer/dashboard}"><i class="fas fa-tachometer-alt nav-icon"></i> Dashboard</a></li>
      <li><a th:href="@{/employer/jobs/new}"><i class="fas fa-plus-circle nav-icon"></i> Post New Job</a></li>
      <li><a th:href="@{/employer/jobs}" class="active"><i class="fas fa-briefcase nav-icon"></i> My Job Posts</a></li>
      <li><a th:href="@{/employer/notifications}"><i class="fas fa-bell nav-icon"></i> Notifications</a></li>
      <li><a th:href="@{/employer/profile}"><i class="fas fa-building nav-icon"></i> Company Profile</a></li>
      <li><a th:href="@{/logout}"><i class="fas fa-sign-out-alt nav-icon"></i> Logout</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <div class="d-flex justify-between align-center mb-4" style="flex-wrap:wrap; gap:1rem;">
      <div>
        <h1 style="font-size:1.6rem;">My Job Posts</h1>
        <p class="text-muted" th:text="'Total: ' + ${#lists.size(jobs)} + ' job(s)'"></p>
      </div>
      <a th:href="@{/employer/jobs/new}" class="btn btn-primary">
        <i class="fas fa-plus"></i> Post New Job
      </a>
    </div>

    <div th:if="${success}" class="alert alert-success" data-auto-dismiss>
      <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
    </div>

    <div class="filter-bar mb-3" style="padding:0.75rem 1rem;">
      <input type="text" id="tableSearch" class="form-control" placeholder="Search jobs..." style="max-width:300px;"/>
    </div>

    <div th:if="${#lists.isEmpty(jobs)}" class="empty-state">
      <i class="fas fa-briefcase"></i>
      <h3>No job posts yet</h3>
      <p>Post your first remote job to start receiving applications.</p>
      <a th:href="@{/employer/jobs/new}" class="btn btn-primary mt-2">Post a Job</a>
    </div>

    <div th:unless="${#lists.isEmpty(jobs)}" class="card">
      <div class="table-wrapper">
        <table class="filterable-table">
          <thead>
            <tr>
              <th>Job Title</th>
              <th>Category</th>
              <th>Type</th>
              <th>Posted</th>
              <th>Views</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="job : ${jobs}">
              <td>
                <strong th:text="${job.title}"></strong>
                <span th:if="${job.featured}" class="badge badge-warning" style="margin-left:6px;">⭐</span>
              </td>
              <td><span class="badge badge-primary" th:text="${#strings.replace(job.category.name(),'_',' ')}"></span></td>
              <td><span class="badge badge-muted" th:text="${#strings.replace(job.jobType.name(),'_',' ')}"></span></td>
              <td th:text="${#temporals.format(job.createdAt,'MMM dd, yyyy')}" class="text-muted"></td>
              <td class="text-muted" th:text="${job.viewsCount}"></td>
              <td>
                <span class="badge" th:classappend="${job.active} ? 'badge-success' : 'badge-danger'"
                      th:text="${job.active} ? 'Active' : 'Inactive'"></span>
              </td>
              <td>
                <div class="d-flex gap-1">
                  <a th:href="@{/employer/jobs/{id}/applicants(id=${job.id})}"
                     class="btn btn-ghost btn-sm" title="View Applicants">
                    <i class="fas fa-users"></i>
                  </a>
                  <a th:href="@{/employer/jobs/{id}/edit(id=${job.id})}"
                     class="btn btn-ghost btn-sm" title="Edit">
                    <i class="fas fa-edit"></i>
                  </a>
                  <form th:action="@{/employer/jobs/{id}/delete(id=${job.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-danger btn-sm"
                            data-confirm="Delete this job? All applications will also be removed."
                            title="Delete">
                      <i class="fas fa-trash"></i>
                    </button>
                  </form>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
