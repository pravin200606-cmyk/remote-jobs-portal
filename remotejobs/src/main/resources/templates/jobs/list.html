<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{fragments/layout :: head('Browse Remote Jobs')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="page-header">
    <div class="container">
        <h1 style="font-size: 1.8rem;">🌍 Browse Remote Jobs</h1>
        <p class="text-muted" th:text="'Found ' + ${jobs.totalElements} + ' remote opportunities'"></p>
    </div>
</div>

<div class="section" style="padding: 2rem 1rem;">
    <div class="container">

        <!-- Filter Bar -->
        <form action="/jobs" method="get" class="filter-bar">
            <div class="filter-group" style="flex: 2; min-width: 200px;">
                <label>Search</label>
                <input type="text" name="keyword" class="form-control" placeholder="Job title, skills, company..."
                       th:value="${keyword}"/>
            </div>
            <div class="filter-group">
                <label>Category</label>
                <select name="category" class="form-control">
                    <option value="">All Categories</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat}"
                            th:text="${#strings.replace(cat.name(), '_', ' ')}"
                            th:selected="${selectedCategory == cat.name()}"></option>
                </select>
            </div>
            <div class="filter-group">
                <label>Experience</label>
                <select name="experienceLevel" class="form-control">
                    <option value="">Any Level</option>
                    <option th:each="exp : ${experienceLevels}"
                            th:value="${exp}"
                            th:text="${#strings.replace(exp.name(), '_', ' ')}"
                            th:selected="${selectedExp == exp.name()}"></option>
                </select>
            </div>
            <div class="filter-group">
                <label>Job Type</label>
                <select name="jobType" class="form-control">
                    <option value="">All Types</option>
                    <option th:each="jt : ${jobTypes}"
                            th:value="${jt}"
                            th:text="${#strings.replace(jt.name(), '_', ' ')}"
                            th:selected="${selectedType == jt.name()}"></option>
                </select>
            </div>
            <div style="align-self: flex-end; display: flex; gap: 0.5rem;">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-search"></i> Filter
                </button>
                <a th:href="@{/jobs}" class="btn btn-ghost">Clear</a>
            </div>
        </form>

        <!-- Job List -->
        <div th:if="${jobs.hasContent()}">
            <div class="job-grid">
                <a th:each="job : ${jobs.content}" th:href="@{/jobs/{id}(id=${job.id})}" class="job-card fade-in"
                   th:classappend="${job.featured} ? ' featured' : ''">
                    <div class="job-card-header">
                        <div>
                            <div class="job-title" th:text="${job.title}"></div>
                            <div class="job-company">
                                <i class="fas fa-building"></i> <span th:text="${job.companyName}"></span>
                            </div>
                        </div>
                        <div class="text-right">
                            <span th:if="${job.featured}" class="badge badge-warning mb-1" style="display:block;">⭐ Featured</span>
                            <div class="job-salary" th:if="${job.salary != null}" th:text="${job.salary}"></div>
                        </div>
                    </div>

                    <div class="job-badges">
                        <span class="badge badge-primary" th:text="${#strings.replace(job.category.name(), '_', ' ')}"></span>
                        <span class="badge badge-muted" th:text="${#strings.replace(job.jobType.name(), '_', ' ')}"></span>
                        <span class="badge badge-info" th:text="${#strings.replace(job.experienceLevel.name(), '_', ' ')}"></span>
                    </div>

                    <div class="job-meta mt-2">
                        <span class="job-meta-item" th:if="${job.timezonePreference != null}">
                            <i class="fas fa-globe"></i> <span th:text="${job.timezonePreference}"></span>
                        </span>
                        <span class="job-meta-item" th:if="${job.locationRequirement != null}">
                            <i class="fas fa-map-marker-alt"></i> <span th:text="${job.locationRequirement}"></span>
                        </span>
                        <span class="job-meta-item">
                            <i class="fas fa-clock"></i>
                            <span th:text="${#temporals.format(job.createdAt, 'MMM dd, yyyy')}"></span>
                        </span>
                        <span class="job-meta-item">
                            <i class="fas fa-eye"></i> <span th:text="${job.viewsCount}"></span>
                        </span>
                    </div>
                </a>
            </div>

            <!-- Pagination -->
            <div class="pagination" th:if="${totalPages > 1}">
                <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                   th:href="@{/jobs(page=${i}, keyword=${keyword}, category=${selectedCategory}, experienceLevel=${selectedExp}, jobType=${selectedType})}"
                   th:text="${i + 1}"
                   class="page-btn"
                   th:classappend="${i == currentPage} ? ' active' : ''"></a>
            </div>
        </div>

        <div th:unless="${jobs.hasContent()}" class="empty-state">
            <i class="fas fa-search"></i>
            <h3>No jobs found</h3>
            <p>Try adjusting your search filters or check back later.</p>
            <a th:href="@{/jobs}" class="btn btn-primary mt-2">Clear Filters</a>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
