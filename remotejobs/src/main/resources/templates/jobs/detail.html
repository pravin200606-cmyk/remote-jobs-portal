<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{fragments/layout :: head('Job Detail')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="section" style="padding: 2rem 1rem;">
  <div class="container-md">

    <a th:href="@{/jobs}" class="btn btn-ghost btn-sm mb-3">
      <i class="fas fa-arrow-left"></i> Back to Jobs
    </a>

    <div class="card fade-in" th:classappend="${job.featured} ? ' featured' : ''">
      <!-- Header -->
      <div class="d-flex justify-between align-center mb-3" style="flex-wrap:wrap; gap:1rem;">
        <div>
          <h1 style="font-size:1.8rem;" th:text="${job.title}"></h1>
          <p class="text-muted mt-1">
            <i class="fas fa-building"></i> <strong th:text="${job.companyName}"></strong>
            <span th:if="${job.companyName != null}"> &nbsp;·&nbsp; </span>
            <i class="fas fa-clock"></i>
            <span th:text="${#temporals.format(job.createdAt, 'MMM dd, yyyy')}"></span>
          </p>
        </div>
        <div class="text-right">
          <div class="job-salary" style="font-size:1.2rem;" th:if="${job.salary != null}" th:text="${job.salary}"></div>
          <span th:if="${job.featured}" class="badge badge-warning mt-1">⭐ Featured</span>
        </div>
      </div>

      <!-- Badges -->
      <div class="job-badges mb-3">
        <span class="badge badge-primary" th:text="${#strings.replace(job.category.name(),'_',' ')}"></span>
        <span class="badge badge-muted" th:text="${#strings.replace(job.jobType.name(),'_',' ')}"></span>
        <span class="badge badge-info" th:text="${#strings.replace(job.experienceLevel.name(),'_',' ')}"></span>
        <span class="badge badge-success"><i class="fas fa-wifi"></i> 100% Remote</span>
      </div>

      <!-- Meta -->
      <div class="d-flex flex-wrap gap-3 mb-4" style="font-size:0.9rem; color:var(--text-muted);">
        <span th:if="${job.timezonePreference}"><i class="fas fa-globe"></i> <span th:text="${job.timezonePreference}"></span></span>
        <span th:if="${job.locationRequirement}"><i class="fas fa-map-marker-alt"></i> <span th:text="${job.locationRequirement}"></span></span>
        <span><i class="fas fa-eye"></i> <span th:text="${job.viewsCount}"></span> views</span>
        <span><i class="fas fa-users"></i> <span th:text="${applicationCount}"></span> applicants</span>
        <span th:if="${job.applicationDeadline}">
          <i class="fas fa-calendar"></i> Deadline: <span th:text="${#temporals.format(job.applicationDeadline,'MMM dd, yyyy')}"></span>
        </span>
      </div>

      <hr style="border-color:var(--border); margin-bottom:1.5rem;"/>

      <!-- Description -->
      <div class="mb-4">
        <h3 class="mb-2">Job Description</h3>
        <div style="color:var(--text-muted); white-space:pre-line;" th:text="${job.description}"></div>
      </div>

      <!-- Skills -->
      <div class="mb-4">
        <h3 class="mb-2">Skills Required</h3>
        <div class="d-flex flex-wrap gap-1">
          <span th:each="skill : ${#strings.arraySplit(job.skillsRequired,',')}"
                class="badge badge-primary" th:text="${#strings.trim(skill)}"></span>
        </div>
      </div>

      <hr style="border-color:var(--border); margin-bottom:1.5rem;"/>

      <!-- Apply Section -->
      <div sec:authorize="!isAuthenticated()">
        <div class="alert alert-info">
          <i class="fas fa-info-circle"></i>
          <span>Please <a th:href="@{/login}" style="color:var(--primary-light); font-weight:600;">sign in</a> or
          <a th:href="@{/register/jobseeker}" style="color:var(--primary-light); font-weight:600;">create an account</a> to apply for this job.</span>
        </div>
      </div>

      <div sec:authorize="hasRole('JOBSEEKER')">
        <div th:if="${hasApplied}" class="alert alert-success">
          <i class="fas fa-check-circle"></i> You have already applied for this position.
        </div>
        <div th:unless="${hasApplied}">
          <a th:href="@{/jobseeker/apply/{id}(id=${job.id})}" class="btn btn-primary btn-lg">
            <i class="fas fa-paper-plane"></i> Apply Now
          </a>
        </div>
      </div>

      <div sec:authorize="hasRole('EMPLOYER')">
        <div class="alert alert-info">
          <i class="fas fa-info-circle"></i> Employers cannot apply for jobs.
        </div>
      </div>
    </div>
  </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
