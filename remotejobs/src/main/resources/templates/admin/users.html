<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Manage Users')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="dashboard-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">Admin Panel</div>
    <ul class="sidebar-nav">
      <li><a th:href="@{/admin/dashboard}"><i class="fas fa-tachometer-alt nav-icon"></i> Dashboard</a></li>
      <li><a th:href="@{/admin/users}" class="active"><i class="fas fa-users nav-icon"></i> Manage Users</a></li>
      <li><a th:href="@{/admin/jobs}"><i class="fas fa-briefcase nav-icon"></i> Manage Jobs</a></li>
      <li><a th:href="@{/jobs}"><i class="fas fa-globe nav-icon"></i> View Site</a></li>
      <li><a th:href="@{/logout}"><i class="fas fa-sign-out-alt nav-icon"></i> Logout</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <div class="d-flex justify-between align-center mb-4" style="flex-wrap:wrap; gap:1rem;">
      <h1 style="font-size:1.6rem;">Manage Users</h1>
      <span class="badge badge-primary" th:text="${#lists.size(users)} + ' Total Users'"></span>
    </div>

    <div th:if="${success}" class="alert alert-success" data-auto-dismiss>
      <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
    </div>

    <div class="filter-bar mb-3" style="padding:0.75rem 1rem;">
      <input type="text" id="tableSearch" class="form-control" placeholder="Search users..." style="max-width:300px;"/>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table class="filterable-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Company</th>
              <th>Joined</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="u, stat : ${users}">
              <td class="text-muted" th:text="${stat.count}"></td>
              <td><strong th:text="${u.fullName}"></strong></td>
              <td class="text-muted" th:text="${u.email}"></td>
              <td>
                <span class="badge"
                      th:classappend="${u.role.name() == 'ROLE_ADMIN'} ? 'badge-danger' :
                                      (${u.role.name() == 'ROLE_EMPLOYER'} ? 'badge-info' : 'badge-success')"
                      th:text="${#strings.replace(u.role.name(),'ROLE_','')}"></span>
              </td>
              <td class="text-muted" th:text="${u.companyName != null} ? ${u.companyName} : '—'"></td>
              <td class="text-muted" th:text="${#temporals.format(u.createdAt,'MMM dd, yyyy')}"></td>
              <td>
                <span class="badge" th:classappend="${u.enabled} ? 'badge-success' : 'badge-danger'"
                      th:text="${u.enabled} ? 'Active' : 'Banned'"></span>
              </td>
              <td>
                <div class="d-flex gap-1">
                  <form th:action="@{/admin/users/{id}/toggle(id=${u.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm"
                            th:classappend="${u.enabled} ? 'btn-warning' : 'btn-success'"
                            th:text="${u.enabled} ? 'Ban' : 'Enable'"></button>
                  </form>
                  <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-danger btn-sm"
                            data-confirm="Permanently delete this user?">
                      <i class="fas fa-trash"></i>
                    </button>
                  </form>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
